<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Yapp by Caviar Studios</title>
    
    <!-- 💎 MAGIC AUTO-GENERATED CAVIAR STUDIOS GOLD DIAMOND ICON -->
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Crect width='100' height='100' rx='20' fill='%2318181b'/%3E%3Cpath d='M50 20 L80 50 L50 80 L20 50 Z' fill='%23eccc68'/%3E%3C/svg%3E">

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; }
        body { background: #09090b; color: #f4f4f5; display: flex; justify-content: center; align-items: center; height: 100vh; }
        
        /* Utility Classes */
        .hidden { display: none !important; }
        .pfp-circle { width: 32px; height: 32px; border-radius: 50%; display: inline-flex; align-items: center; justify-content: center; font-weight: bold; font-size: 14px; color: white; text-transform: uppercase; }

        /* Login Screen */
        .auth-card { background: #18181b; padding: 30px; border-radius: 12px; width: 100%; max-width: 380px; border: 1px solid #27272a; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        .auth-card h2 { text-align: center; margin-bottom: 6px; font-size: 1.6rem; letter-spacing: -0.5px; }
        .auth-card p { text-align: center; color: #a1a1aa; font-size: 0.85rem; margin-bottom: 4px; }
        .form-group { margin-bottom: 16px; display: flex; flex-direction: column; gap: 6px; }
        .form-row { display: flex; gap: 10px; }
        label { font-size: 0.8rem; color: #a1a1aa; text-transform: uppercase; letter-spacing: 0.5px; }
        input, select { background: #27272a; border: 1px solid #3f3f46; padding: 10px 12px; border-radius: 6px; color: white; font-size: 0.95rem; outline: none; transition: 0.2s; }
        input:focus, select:focus { border-color: #a1a1aa; }
        .btn { background: #f4f4f5; color: #09090b; border: none; padding: 12px; border-radius: 6px; font-weight: 600; cursor: pointer; font-size: 0.95rem; margin-top: 10px; width: 100%; transition: 0.2s; }
        .btn:hover { background: #e4e4e7; }
        
        /* Error Alert Message Styling */
        .error-banner { background: #ef4444; color: white; padding: 10px; border-radius: 6px; font-size: 0.85rem; text-align: center; margin-bottom: 15px; display: none; font-weight: 500; }

        /* Main Layout */
        .app-container { width: 100%; max-width: 900px; height: 85vh; background: #121214; border-radius: 12px; border: 1px solid #27272a; display: flex; overflow: hidden; box-shadow: 0 20px 40px rgba(0,0,0,0.6); }
        
        /* Sidebar (Desktop) */
        .sidebar { width: 260px; background: #18181b; border-right: 1px solid #27272a; display: flex; flex-direction: column; }
        .current-user-tag { padding: 16px; border-bottom: 1px solid #27272a; display: flex; align-items: center; gap: 10px; font-weight: 600; font-size: 0.95rem; }
        .current-user-tag span { color: #a1a1aa; font-size: 0.8rem; font-weight: normal; }
        .channels { flex: 1; padding: 15px 10px; display: flex; flex-direction: column; gap: 5px; overflow-y: auto; }
        
        /* Standard Channel Row Framework */
        .chan-btn { padding: 10px; border-radius: 6px; cursor: pointer; font-size: 0.95rem; color: #a1a1aa; display: flex; align-items: center; justify-content: space-between; gap: 8px; transition: 0.2s; }
        .chan-btn:hover, .chan-btn.active { background: #27272a; color: #f4f4f5; }
        .chan-left { display: flex; align-items: center; gap: 8px; min-width: 0; text-overflow: ellipsis; overflow: hidden; white-space: nowrap; }
        
        /* Sneaky Delete Button Hover Action */
        .nuke-room-trigger { color: #71717a; font-size: 0.8rem; padding: 2px 6px; border-radius: 4px; transition: 0.15s; font-weight: bold; }
        .nuke-room-trigger:hover { background: #ef4444; color: white; }

        /* DM Creator Form inside Sidebar */
        .dm-start { padding: 12px; border-top: 1px solid #27272a; display: flex; flex-direction: column; gap: 8px; background: #18181b; }
        .dm-start input { padding: 6px 8px; font-size: 0.8rem; }

        /* Brand Footer Styling */
        .brand-footer { padding: 10px 16px; font-size: 0.7rem; color: #3f3f46; border-top: 1px solid #27272a; background: #141416; text-align: center; letter-spacing: 0.5px; font-weight: 500; }

        /* Chat Area */
        .chat-main { flex: 1; display: flex; flex-direction: column; background: #0f0f11; min-height: 0; position: relative; }
        .chat-header { padding: 16px 20px; border-bottom: 1px solid #27272a; font-weight: 600; font-size: 1.05rem; display: flex; align-items: center; justify-content: space-between; gap: 8px; }
        .messages-pane { flex: 1; padding: 20px; overflow-y: auto; display: flex; flex-direction: column; gap: 15px; }
        
        /* Message Layout */
        .message-row { display: flex; gap: 12px; align-items: flex-start; }
        .msg-content { display: flex; flex-direction: column; gap: 3px; }
        .msg-meta { font-size: 0.85rem; font-weight: 600; color: #f4f4f5; }
        .msg-meta .tag { color: #71717a; font-weight: normal; font-size: 0.75rem; }
        .msg-meta .time { color: #52525b; font-weight: normal; font-size: 0.75rem; margin-left: 6px; }
        .msg-text { font-size: 0.95rem; color: #e4e4e7; word-break: break-word; }

        /* Input Bar */
        .input-container { padding: 20px; background: #0f0f11; }
        .input-wrapper { display: flex; background: #18181b; border: 1px solid #27272a; border-radius: 8px; padding: 4px; }
        .input-wrapper input { flex: 1; background: transparent; border: none; padding: 10px; color: white; outline: none; }
        .input-wrapper input:focus { border: none; }
        .input-wrapper button { background: transparent; border: none; color: #a1a1aa; padding: 0 15px; cursor: pointer; font-weight: 600; }
        .input-wrapper button:hover { color: #f4f4f5; }

        /* 📱 NEW MOBILE NAVIGATION ELEMENT STYLES */
        .mobile-nav-bar { display: none; background: #18181b; border-top: 1px solid #27272a; height: 60px; justify-content: space-around; align-items: center; }
        .nav-item { color: #a1a1aa; font-size: 0.9rem; font-weight: 600; display: flex; flex-direction: column; align-items: center; gap: 2px; cursor: pointer; width: 50%; height: 100%; justify-content: center; transition: 0.2s; }
        .nav-item.active { color: #f4f4f5; background: #27272a; }

        /* 📱 MOBILE MODAL OVERLAY FOR CHATS */
        .mobile-modal { display: none; position: absolute; top: 0; left: 0; width: 100%; height: calc(100% - 60px); background: rgba(9,9,11,0.95); z-index: 999; flex-direction: column; padding: 20px; }
        .modal-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; border-bottom: 1px solid #27272a; padding-bottom: 10px; }
        .close-modal-btn { background: #27272a; color: white; border: none; padding: 6px 12px; border-radius: 6px; cursor: pointer; font-size: 0.85rem; }

        /* Mobile Responsive UI Overrides */
        @media (max-width: 768px) {
            body { padding: 0; overflow: hidden; }
            .app-container { width: 100vw; max-width: 100vw; height: 100vh; border-radius: 0; border: none; display: flex; flex-direction: column; }
            .sidebar { display: none !important; } /* Atomize the desktop sidebar on mobile */
            .chat-main { flex: 1; height: calc(100vh - 60px); }
            .mobile-nav-bar { display: flex; }
            .messages-pane { padding: 15px; gap: 12px; }
            .input-container { padding: 12px; }
        }
    </style>
</head>
<body>

    <!-- LOGIN SCREEN -->
    <div class="auth-card" id="auth-screen">
        <h2>Welcome to Yapp</h2>
        <p>Stop talking, start yapping.</p>
        <p style="color: #eccc68; font-weight: 500; letter-spacing: 0.3px; margin-bottom: 24px; font-size: 0.8rem;">A Caviar Studios Production</p>
        
        <div id="error-message" class="error-banner"></div>

        <div class="form-group">
            <label>Username</label>
            <div class="form-row">
                <input type="text" id="reg-user" placeholder="e.g., ToxicYapper" style="flex: 1;">
                <input type="text" id="reg-tag" placeholder="#12345" style="width: 90px;" maxlength="6">
            </div>
        </div>
        <div class="form-group">
            <label>Password</label>
            <input type="password" id="reg-pass" placeholder="••••••••">
        </div>
        <div class="form-group">
            <label>Profile Color</label>
            <select id="reg-color">
                <option value="#ff4757">🔥 Red</option>
                <option value="#ffa502">🍊 Orange</option>
                <option value="#eccc68">☀️ Yellow</option>
                <option value="#2ed573">🌿 Green</option>
                <option value="#1e90ff">💧 Blue</option>
                <option value="#3742fa">🪻 Indigo</option>
                <option value="#8e44ad">🍇 Violet</option>
            </select>
        </div>
        <button class="btn" id="login-btn" onclick="handleLogin()">Login / Register</button>
    </div>

    <!-- MAIN APP SCREEN -->
    <div class="app-container hidden" id="app-screen">
        
        <!-- DESKTOP SIDEBAR -->
        <div class="sidebar">
            <div class="current-user-tag" id="user-profile-summary"></div>
            <div class="channels">
                <div class="chan-btn active" id="global-chan-btn" onclick="switchTab('global', '🌍 global-yapp')">
                    <div class="chan-left">🌍 global-yapp</div>
                </div>
                <div style="font-size: 0.75rem; color: #52525b; text-transform: uppercase; letter-spacing: 0.5px; margin: 15px 0 5px 10px; font-weight: bold;">Direct Messages</div>
                <div id="dm-list-container" style="display:flex; flex-direction:column; gap:4px;"></div>
            </div>
            <div class="dm-start">
                <label>Start Private DM</label>
                <div style="display: flex; gap: 4px; width: 100%;">
                    <input type="text" id="dm-target-input" placeholder="User#12345 + Enter" onkeypress="handleDmTargetKey(event)" style="flex: 1;">
                    <button onclick="triggerMobileDmSubmit(false)" style="background: #27272a; color: white; border: 1px solid #3f3f46; border-radius: 6px; padding: 0 10px; cursor: pointer; font-size: 0.8rem;">Go</button>
                </div>
            </div>
            <div class="brand-footer">
                BY CAVIAR STUDIOS © 2026
            </div>
        </div>

        <!-- MAIN CHAT INTERFACE -->
        <div class="chat-main">
            
            <!-- MOBILE CHATS OVERLAY MODAL -->
            <div class="mobile-modal" id="chats-overlay-modal">
                <div class="modal-header">
                    <h3 style="font-size: 1.1rem; font-weight: bold;">Direct Messages</h3>
                    <button class="close-modal-btn" onclick="toggleMobileModal(false)">Close</button>
                </div>
                <!-- Dynamic Mobile DM lists anchor here -->
                <div id="mobile-dm-list-container" style="display:flex; flex-direction:column; gap:10px; flex: 1; overflow-y: auto; margin-bottom: 20px;"></div>
                
                <div style="background: #18181b; padding: 15px; border-radius: 8px; border: 1px solid #27272a;">
                    <label style="display:block; margin-bottom: 8px;">Start Private DM</label>
                    <div style="display: flex; gap: 6px; width: 100%;">
                        <input type="text" id="mobile-dm-target-input" placeholder="User#12345" style="flex: 1; padding: 12px;" onkeypress="if(event.key==='Enter') triggerMobileDmSubmit(true)">
                        <button onclick="triggerMobileDmSubmit(true)" style="background: #f4f4f5; color: #09090b; border: none; border-radius: 6px; padding: 0 20px; font-weight: bold; cursor: pointer;">Go</button>
                    </div>
                </div>
            </div>

            <div class="chat-header" id="chat-header-root">
                <div id="chat-title-text">🌍 global-yapp</div>
                <div id="admin-nuke-slot"></div>
            </div>
            <div class="messages-pane" id="messages-root"></div>
            <div class="input-container">
                <div class="input-wrapper">
                    <input type="text" id="chat-raw-input" placeholder="Message..." onkeypress="handleChatKey(event)">
                    <button onclick="dispatchMessage()">Yap</button>
                </div>
            </div>

            <!-- Sleek Mobile Bottom Bar Navigation Framework -->
            <div class="mobile-nav-bar">
                <div class="nav-item active" id="mobile-nav-global" onclick="handleMobileNavClick('global')">
                    <span>🌍</span>
                    <span>Global</span>
                </div>
                <div class="nav-item" id="mobile-nav-chats" onclick="handleMobileNavClick('chats')">
                    <span>💬</span>
                    <span>Chats</span>
                </div>
            </div>

        </div>
    </div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
    const SUPABASE_URL = 'https://jbgodvduntlpblubkpxj.supabase.co';
    const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImpiZ29kdmR1bnRscGJsdWJrcHhqIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODEzMzk2NjEsImV4cCI6MjA5NjkxNTY2MX0.4wOvYohtw9U0bGrHaV2RHvJFoJqhQKVZxBZf09z_1lE'; 
    const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

    let currentUser = null; 
    let currentTab = 'global'; 
    let activeDms = []; 

    function showError(text) {
        const errBox = document.getElementById('error-message');
        errBox.innerText = text;
        errBox.style.display = 'block';
    }

    function clearError() {
        document.getElementById('error-message').style.display = 'none';
    }

    async function handleLogin() {
        clearError();
        const username = document.getElementById('reg-user').value.trim();
        let tag = document.getElementById('reg-tag').value.trim();
        const pass = document.getElementById('reg-pass').value;
        const color = document.getElementById('reg-color').value;

        if(!username || !pass) { showError('Fill in your details, bro!'); return; }
        if(!tag.startsWith('#')) { tag = '#' + tag; }
        if(tag.length < 2) { tag = '#12345'; }

        const loginBtn = document.getElementById('login-btn');
        loginBtn.innerText = "Checking...";
        loginBtn.disabled = true;

        try {
            const { data: userExists, error: fetchError } = await supabaseClient
                .from('users')
                .select('*')
                .eq('username', username)
                .maybeSingle();

            if (fetchError) throw fetchError;

            if (userExists) {
                if (userExists.password !== pass) {
                    showError('❌ Wrong password for this username, bro!');
                    loginBtn.innerText = "Login / Register";
                    loginBtn.disabled = false;
                    return;
                }
                currentUser = { 
                    username: userExists.username, 
                    tag: userExists.tag, 
                    color: userExists.color, 
                    fullTag: `${userExists.username}${userExists.tag}` 
                };
            } else {
                const { error: insertError } = await supabaseClient
                    .from('users')
                    .insert([{ username, password: pass, tag, color }]);

                if (insertError) throw insertError;

                currentUser = { username, tag, color, fullTag: `${username}${tag}` };
            }

            document.getElementById('user-profile-summary').innerHTML = `
                <div class="pfp-circle" style="background: ${currentUser.color}">${currentUser.username[0]}</div>
                <div>${currentUser.username}<span>${currentUser.tag}</span></div>
            `;

            document.getElementById('auth-screen').classList.add('hidden');
            document.getElementById('app-screen').classList.remove('hidden');
            
            evaluateAdminPermissions();
            
            await autoDiscoverRooms();
            fetchMessages();
            listenForNewMessages();

        } catch (err) {
            console.error(err);
            showError('Database error: ' + (err.message || 'Check your connections.'));
            loginBtn.innerText = "Login / Register";
            loginBtn.disabled = false;
        }
    }

    function evaluateAdminPermissions() {
        const nukeSlot = document.getElementById('admin-nuke-slot');
        if(currentUser.fullTag.toLowerCase() === 'admin#67676') {
            nukeSlot.innerHTML = `
                <button onclick="nukeGlobalChatLog()" style="background: #ef4444; color: white; border: none; border-radius: 6px; padding: 6px 12px; cursor: pointer; font-size: 0.75rem; font-weight: 600; transition: 0.2s;">
                    💥 Nuke Global Chat
                </button>
            `;
        } else {
            nukeSlot.innerHTML = '';
        }
    }

    async function nukeGlobalChatLog() {
        const confirmGlobalNuke = confirm("⚠️ ADMIN COMMAND: Are you completely sure you want to delete ALL messages inside the Global Room? This cannot be undone!");
        if(!confirmGlobalNuke) return;

        try {
            const { error: nullErr } = await supabaseClient
                .from('messages')
                .delete()
                .is('room', null);

            const { error: eqErr } = await supabaseClient
                .from('messages')
                .delete()
                .eq('room', 'global');

            if (nullErr || eqErr) throw (nullErr || eqErr);

            alert("Global Chat successfully wiped clear! Space optimized. 🏎️💨");
            fetchMessages();
        } catch(err) {
            console.error("Global wipe failed:", err);
            alert("Failed to wipe database records.");
        }
    }

    async function autoDiscoverRooms() {
        try {
            const { data, error } = await supabaseClient
                .from('messages')
                .select('room')
                .not('room', 'is', null)
                .not('room', 'eq', 'global');

            if (error) throw error;

            const foundDms = new Set();
            const lowerTag = currentUser.fullTag.toLowerCase();

            (data || []).forEach(msg => {
                const r = msg.room.toLowerCase();
                const parts = r.split('_');
                if (parts.includes(lowerTag)) {
                    const opponent = parts.find(p => p !== lowerTag);
                    if (opponent) foundDms.add(opponent);
                }
            });

            activeDms = Array.from(foundDms);
            renderDmList();
        } catch(e) {
            console.error("Auto-discovery failed:", e);
        }
    }

    function getRoomId(userA, userB) {
        return [userA.toLowerCase(), userB.toLowerCase()].sort().join('_');
    }

    function handleDmTargetKey(e) {
        if(e.key === 'Enter') {
            e.preventDefault();
            triggerMobileDmSubmit(false);
        }
    }

    function triggerMobileDmSubmit(isFromMobileModal = false) {
        const inputId = isFromMobileModal ? 'mobile-dm-target-input' : 'dm-target-input';
        const targetInput = document.getElementById(inputId);
        const targetUser = targetInput.value.trim();
        
        if(!targetUser || targetUser.toLowerCase() === currentUser.fullTag.toLowerCase()) {
            targetInput.value = '';
            return;
        }

        const exists = activeDms.some(val => val.toLowerCase() === targetUser.toLowerCase());
        if(!exists) {
            activeDms.push(targetUser.toLowerCase());
        }

        if(isFromMobileModal) {
            toggleMobileModal(false);
            updateMobileNavHighlights('chats');
        }

        switchTab(getRoomId(currentUser.fullTag, targetUser), `💬 ${targetUser}`);
        targetInput.value = '';
    }

    async function nukeChatRoom(targetUser, event) {
        event.stopPropagation(); 
        
        const targetRoom = getRoomId(currentUser.fullTag, targetUser);
        const confirmNuke = confirm(`⚠️ Yo, you sure? This will delete ALL messages inside this chat for everyone!`);
        if(!confirmNuke) return;

        try {
            const { error } = await supabaseClient
                .from('messages')
                .delete()
                .eq('room', targetRoom);

            if (error) throw error;

            activeDms = activeDms.filter(u => u.toLowerCase() !== targetUser.toLowerCase());
            
            if (currentTab === targetRoom) {
                switchTab('global', '🌍 global-yapp');
                updateMobileNavHighlights('global');
            } else {
                renderDmList();
            }
        } catch (err) {
            console.error("Could not delete room:", err);
            alert("DB Error wiping text layers. Check logs!");
        }
    }

    function renderDmList() {
        const desktopContainer = document.getElementById('dm-list-container');
        const mobileContainer = document.getElementById('mobile-dm-list-container');
        
        desktopContainer.innerHTML = '';
        mobileContainer.innerHTML = '';
        
        activeDms.forEach(user => {
            const roomId = getRoomId(currentUser.fullTag, user);
            
            // Render for Desktop
            const btnDesktop = document.createElement('div');
            btnDesktop.className = `chan-btn ${currentTab === roomId ? 'active' : ''}`;
            btnDesktop.onclick = () => switchTab(roomId, `💬 ${user}`);
            btnDesktop.innerHTML = `
                <div class="chan-left">💬 ${user}</div>
                <div class="nuke-room-trigger" onclick="nukeChatRoom('${user}', event)">✕</div>
            `;
            desktopContainer.appendChild(btnDesktop);

            // Render for Mobile with larger, easier-to-tap targets
            const btnMobile = document.createElement('div');
            btnMobile.className = `chan-btn ${currentTab === roomId ? 'active' : ''}`;
            btnMobile.style.padding = "16px 12px"; /* Big hit-box spacing */
            btnMobile.style.background = "#18181b";
            btnMobile.style.border = "1px solid #27272a";
            btnMobile.onclick = () => {
                switchTab(roomId, `💬 ${user}`);
                toggleMobileModal(false);
                updateMobileNavHighlights('chats');
            };
            btnMobile.innerHTML = `
                <div class="chan-left" style="font-size: 1rem; font-weight: 500;">💬 ${user}</div>
                <div class="nuke-room-trigger" style="font-size: 1.1rem; padding: 6px 12px;" onclick="nukeChatRoom('${user}', event)">✕</div>
            `;
            mobileContainer.appendChild(btnMobile);
        });
    }

    function switchTab(tabId, titleText = '🌍 global-yapp') {
        currentTab = tabId.toLowerCase();
        document.getElementById('global-chan-btn').classList.toggle('active', currentTab === 'global');
        document.getElementById('chat-title-text').innerText = titleText;
        
        const nukeSlot = document.getElementById('admin-nuke-slot');
        if (currentTab === 'global' && currentUser.fullTag.toLowerCase() === 'admin#67676') {
            nukeSlot.style.display = 'block';
        } else {
            nukeSlot.style.display = 'none';
        }

        renderDmList();
        fetchMessages();
    }

    /* 📱 NEW MOBILE UI NAVIGATION MOTORS */
    function handleMobileNavClick(type) {
        if(type === 'global') {
            toggleMobileModal(false);
            switchTab('global', '🌍 global-yapp');
            updateMobileNavHighlights('global');
        } else if(type === 'chats') {
            toggleMobileModal(true);
        }
    }

    function toggleMobileModal(show) {
        const modal = document.getElementById('chats-overlay-modal');
        modal.style.display = show ? 'flex' : 'none';
    }

    function updateMobileNavHighlights(activeType) {
        document.getElementById('mobile-nav-global').classList.toggle('active', activeType === 'global');
        document.getElementById('mobile-nav-chats').classList.toggle('active', activeType === 'chats');
    }

    async function fetchMessages() {
        let query = supabaseClient.from('messages').select('*');
        if (currentTab === 'global') {
            query = query.or('room.is.null,room.eq.global');
        } else {
            query = query.eq('room', currentTab);
        }
        const { data, error } = await query.order('created_at', { ascending: true });
        if (error) console.error(error);
        else renderMessages(data || []);
    }

    async function dispatchMessage() {
        const input = document.getElementById('chat-raw-input');
        const text = input.value.trim();
        if(!text) return;

        const { error } = await supabaseClient.from('messages').insert([{
            sender: currentUser.username,
            tag: currentUser.tag,
            color: currentUser.color,
            text: text,
            room: currentTab
        }]);

        if (error) console.error(error);
        input.value = '';
    }

    function listenForNewMessages() {
        supabaseClient
            .channel('public:messages')
            .on('postgres_changes', { event: '*', schema: 'public', table: 'messages' }, (payload) => {
                if (payload.eventType === 'DELETE') {
                    autoDiscoverRooms();
                    fetchMessages();
                    return;
                }

                if (payload.eventType === 'INSERT') {
                    const newMsg = payload.new;
                    if (newMsg.room && newMsg.room !== 'global') {
                        const structuralParts = newMsg.room.toLowerCase().split('_');
                        if (structuralParts.includes(currentUser.fullTag.toLowerCase())) {
                            const senderFullTag = `${newMsg.sender}${newMsg.tag}`.toLowerCase();
                            const exists = activeDms.some(val => val.toLowerCase() === senderFullTag);
                            if (senderFullTag !== currentUser.fullTag.toLowerCase() && !exists) {
                                activeDms.push(senderFullTag);
                                renderDmList();
                            }
                        }
                    }

                    const isGlobalMatch = currentTab === 'global' && (!newMsg.room || newMsg.room.toLowerCase() === 'global');
                    const isPrivateMatch = currentTab === (newMsg.room ? newMsg.room.toLowerCase() : '');
                    if (isGlobalMatch || isPrivateMatch) {
                        fetchMessages();
                    }
                }
            })
            .subscribe();
    }

    function handleChatKey(e) { if(e.key === 'Enter') dispatchMessage(); }

    function renderMessages(messagesList) {
        const pane = document.getElementById('messages-root');
        pane.innerHTML = '';

        messagesList.forEach(msg => {
            const timeStr = msg.created_at ? new Date(msg.created_at).toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' }) : '';
            const row = document.createElement('div');
            row.className = 'message-row';
            row.innerHTML = `
                <div class="pfp-circle" style="background: ${msg.color || '#3f3f46'}">${(msg.sender || 'Y')[0]}</div>
                <div class="msg-content">
                    <div class="msg-meta">
                        ${msg.sender || 'Anonymous'}<span class="tag">${msg.tag || ''}</span><span class="time">${timeStr}</span>
                    </div>
                    <div class="msg-text">${msg.text || ''}</div>
                </div>
            `;
            pane.appendChild(row);
        });
        pane.scrollTop = pane.scrollHeight;
    }
</script>
</body>
</html>
